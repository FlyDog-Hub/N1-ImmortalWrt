name: build ImmortalWrt-24.10 for N1

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: '是否连接 SSH 到 Actions'
        required: true
        default: 'false'
        type: choice
        options:
          - true
          - false
  schedule:
    - cron: '0 16 * * 0'

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  DIY_P1_SH: diy-1.sh
  DIY_P2_SH: diy-2.sh
  TZ: Asia/Shanghai
  CCACHE_DIR: /workdir/ccache
  USE_CCACHE: '1'
  CCACHE_MAXSIZE: 20G

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 720

    steps:
    - name: 检出工作流仓库
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: 恢复缓存：dl（源码包）
      uses: actions/cache@v4
      with:
        path: openwrt/dl
        key: ${{ runner.os }}-openwrt-dl-${{ env.REPO_BRANCH }}-${{ hashFiles('**/feeds.conf*','**/.config','diy-*.sh') }}
        restore-keys: |
          ${{ runner.os }}-openwrt-dl-${{ env.REPO_BRANCH }}-

    - name: 恢复缓存：staging_dir（工具链）
      uses: actions/cache@v4
      with:
        path: openwrt/staging_dir
        key: ${{ runner.os }}-openwrt-staging-${{ env.REPO_BRANCH }}-${{ hashFiles('**/feeds.conf*') }}
        restore-keys: |
          ${{ runner.os }}-openwrt-staging-${{ env.REPO_BRANCH }}-

    - name: 恢复缓存：build_dir（部分编译产物）
      uses: actions/cache@v4
      with:
        path: openwrt/build_dir
        key: ${{ runner.os }}-openwrt-build-${{ env.REPO_BRANCH }}-${{ hashFiles('openwrt/.config','diy-*.sh') }}
        restore-keys: |
          ${{ runner.os }}-openwrt-build-${{ env.REPO_BRANCH }}-

    - name: 恢复缓存：ccache
      uses: actions/cache@v4
      with:
        path: /workdir/ccache
        key: ${{ runner.os }}-ccache-${{ env.REPO_BRANCH }}-${{ hashFiles('diy-*.sh','**/.config') }}
        restore-keys: |
          ${{ runner.os }}-ccache-${{ env.REPO_BRANCH }}-

    - name: 释放磁盘空间
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: 安装编译依赖环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: 配置 ccache
      run: |
        mkdir -p $CCACHE_DIR
        ccache --max-size=${CCACHE_MAXSIZE}
        ccache -s || true

    - name: 克隆源码
      working-directory: /workdir
      run: |
        git clone $REPO_URL -b $REPO_BRANCH --single-branch --depth=1 openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 执行 DIY 脚本并更新 feeds
      run: |
        chmod +x $DIY_P1_SH $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH || true
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        cd $GITHUB_WORKSPACE
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH || true
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 加载 N1 自定义配置
      run: |
        rm -rf openwrt/files openwrt/.config
        mv files .config openwrt/

    - name: SSH 连接到 Actions
      uses: P3TERX/ssh2actions@main
      if: github.event.inputs.ssh == 'true'

    - name: 下载软件包
      working-directory: ./openwrt
      run: |
        make defconfig
        make download -j$(( $(nproc) * 2 ))
        find dl -size -1k -exec ls -l {} \;
        find dl -size -1k -exec rm -f {} \;

    - name: 编译 N1 固件
      env:
        USE_CCACHE: '1'
        CCACHE_DIR: ${{ env.CCACHE_DIR }}
      run: |
        chmod -R 755 openwrt
        cd openwrt
        echo -e "$(nproc) 线程编译"
        make -j$(( $(nproc) + 1 )) || make -j1 V=s

    - name: 显示 ccache 统计信息
      if: always()
      run: |
        ccache -s || true

    - name: 打包 ARM 内核
      uses: unifreq/openwrt_packit@master
      env:
        OPENWRT_ARMVIRT: openwrt/bin/targets/armsr/armv8/*rootfs.tar.gz
        KERNEL_REPO_URL: breakingbadboy/OpenWrt
        KERNEL_VERSION_NAME: 6.6.y
        PACKAGE_SOC: diy
        GZIP_IMGS: .xz
        SCRIPT_DIY_PATH: mk_s905d_n1.sh
        WHOAMI: Winnie-0721
        SW_FLOWOFFLOAD: 0
        SFE_FLOW: 0

    - name: 发布固件
      uses: softprops/action-gh-release@master
      with:
        tag_name: ImmortalWrt_${{ env.PACKAGED_OUTPUTDATE }}
        files: ${{ env.PACKAGED_OUTPUTPATH }}/*.img.xz
        body: |
          首次使用建议全新刷写
          * 基本信息
          IP: 192.168.1.3
          账户: root
          密码: password

    - name: 清理运行记录
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 3
        keep_minimum_runs: 4
        token: ${{ env.GITHUB_TOKEN }}

    - name: 删除旧固件
      uses: dev-drprasad/delete-older-releases@master
      with:
        keep_latest: 2
        delete_tags: true
