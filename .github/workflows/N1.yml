name: Build ImmortalWrt-24.10 for N1

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: true
        default: 'false'
        type: choice
        options:
          - true
          - false
  schedule:
    - cron: '0 16 * * 0'

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  DIY_P1_SH: diy-1.sh
  DIY_P2_SH: diy-2.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: 恢复缓存
        uses: actions/cache@v3
        with:
          path: |
            openwrt/dl
            openwrt/staging_dir
          key: ${{ runner.os }}-immortalwrt-${{ env.REPO_BRANCH }}-${{ hashFiles('**/feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-immortalwrt-${{ env.REPO_BRANCH }}-

      - name: 检查action
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 构建编译环境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential ccache curl git \
            libncurses-dev zlib1g-dev gawk gcc-multilib \
            g++-multilib python3 python3-pyelftools unzip \
            bash-completion file \
            ccache subversion swig rsync squashfs-tools \
            patch libssl-dev libelf-dev \
            && sudo apt-get clean \
            && sudo rm -rf /var/lib/apt/lists/*

      - name: 准备工作环境
        run: |
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: 克隆源码
        working-directory: /workdir
        run: git clone $REPO_URL -b $REPO_BRANCH --single-branch --depth=1 openwrt

      - name: 连接工作区域
        run: ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: 安装和更新Feeds
        working-directory: openwrt
        run: |
          chmod +x $GITHUB_WORKSPACE/$DIY_P1_SH $GITHUB_WORKSPACE/$DIY_P2_SH
          $GITHUB_WORKSPACE/$DIY_P1_SH
          ./scripts/feeds update -a && ./scripts/feeds install -a
          $GITHUB_WORKSPACE/$DIY_P2_SH
          ./scripts/feeds update -a && ./scripts/feeds install -a

      - name: 加载 N1 自定义配置
        run: |
          rm -rf files .config
          mv files .config openwrt/

      - name: SSH debug
        if: ${{ github.event.inputs.ssh == 'true' }}
        uses: P3TERX/ssh2actions@main

      - name: 下载软件包
        working-directory: openwrt
        run: |
          make defconfig
          make download -j$(( $(nproc)*2 ))
          find dl -size -1k -delete

      - name: 编译 N1 固件
        working-directory: openwrt
        run: |
          echo "Using $(( $(nproc)+1 )) threads"
          make -j$(( $(nproc)+1 )) || make -j1 V=s
          make clean

      - name: 打包ARM内核
        uses: unifreq/openwrt_packit@master
        env:
          OPENWRT_ARMVIRT: openwrt/bin/targets/armsr/armv8/*rootfs.tar.gz
          KERNEL_REPO_URL: breakingbadboy/OpenWrt
          KERNEL_VERSION_NAME: 6.6.y
          PACKAGE_SOC: diy
          GZIP_IMGS: .xz
          SCRIPT_DIY_PATH: mk_s905d_n1.sh
          WHOAMI: Winnie-0721
          SW_FLOWOFFLOAD: 0
          SFE_FLOW: 0

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: N1-firmware-${{ github.run_number }}
          path: |
            openwrt/bin/targets/armsr/armv8/*.img.xz

      - name: 创建发行版本
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ImmortalWrt_${{ github.run_number }}
          files: openwrt/bin/targets/armsr/armv8/*.img.xz

